<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trabalhando com Imagens</title>
  </head>
  <body>
    <h1>Trabalhando com imagens</h1>
    <p>O uso da tag <b>img</b> e os atributos <b> src</b> e <b> alt</b></p>

    <p>
        <!-- Tag <img> insere imagens no fluxo de conteudo -->
      <img src="img/7108222102930.webp" alt="Talking Tom do velho testamento" />
      <!-- src: caminho para o arquivo da imagem. alt: texto alternativo para acessibilidade e SEo.
        obs: Recomendo evitar imagens sem alt -->

        <figure>
            <!-- tag semantica -->
            <img src="img/talking-ben-screenshot.avif" alt="Talking Tom do velho testamento">
            <figcaption>
                <!-- Legenda da imagem -->
                Imagem do cachorro maldito
            </figcaption>
        </figure>
        
    </p>
  </body>
</html>
